name: Shellcheck

on:
  push:
    branches: [main]
    paths:
      - "hooks/**.sh"
      - ".github/workflows/shellcheck.yml"
  pull_request:
    paths:
      - "hooks/**.sh"
      - ".github/workflows/shellcheck.yml"

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: "./hooks"
          severity: warning
